name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-readme-cards.yml

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=ybg345&show_icons=true&hide_border=false&theme=default&include_all_commits=true&count_private=true&rank_icon=percentile&custom_title=Mehedi Farazi's GitHub Stats&bg_color=FFFFFF&title_color=0969DA&icon_color=1A7F37&text_color=24292F&border_color=D0D7DE"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=ybg345&layout=compact&langs_count=8&hide_border=false&theme=default&bg_color=FFFFFF&title_color=0969DA&text_color=24292F&border_color=D0D7DE
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - sql-hands-on
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=ybg345&repo=sql-hands-on&theme=default&hide_border=false&bg_color=FFFFFF&title_color=0969DA&text_color=24292F&border_color=D0D7DE
          path: profile/pin-sql-hands-on.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card - w3-resource-python
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=ybg345&repo=w3-resource-python&theme=default&hide_border=false&bg_color=FFFFFF&title_color=0969DA&text_color=24292F&border_color=D0D7DE
          path: profile/pin-w3-resource-python.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: username=ybg345&theme=flat&column=4&margin-w=8&margin-h=8
          path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "chore: update profile README cards"
          git push
